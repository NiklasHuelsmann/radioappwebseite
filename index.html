<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brian-Radio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            padding: 20px;
            background-color: #333;
            border-bottom: 3px solid #00aaff; /* Neue Farbe für Brain-Radio */
        }
        .content {
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }
        .radio-player {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <header>
        <h1>Brian-Radio</h1>
    </header>

    <div class="content">
        <p>Willkommen beim Brian-Radio!</p>
        
        <div class="radio-player">
            <!-- FÜGE HIER DEINEN LAUT.FM EMBED CODE EIN -->
            <!-- Der Player von laut.fm zeigt bei korrekter Einstellung automatisch das Cover und die letzten Songs an -->
        </div>

        <footer style="margin-top: 40px; font-size: 12px; color: #777;">
            <p>&copy; 2026 Brian-Radio</p>
        </footer>
    </div>

</body>
</html>
