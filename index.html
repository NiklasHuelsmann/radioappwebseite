<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brian-Radio – Dein Web-Radio</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #121212, #1f1f1f); 
            color: #ffffff; 
            text-align: center; 
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .radio-card { 
            background: rgba(30, 30, 30, 0.95); 
            padding: 30px; 
            border-radius: 20px; 
            width: 100%;
            max-width: 450px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Logo Bereich */
        .station-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00aaff;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.4);
        }

        h1 { 
            margin: 5px 0 20px 0; 
            color: #ffffff; 
            font-size: 26px;
            letter-spacing: 1px;
        }
        
        /* Album Cover Bereich */
        .cover-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px auto;
        }

        #album-cover {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            background-color: #222;
        }

        /* Song-Informationen */
        .info-box { 
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 4px solid #00aaff;
        }

        #current-artist {
            font-weight: bold;
            color: #00aaff;
            font-size: 18px;
            display: block;
            margin-bottom: 5px;
        }

        #current-title {
            color: #dddddd;
            font-size: 15px;
            display: block;
        }
        
        /* Stylischer Abspielen-Knopf */
        #playButton { 
            width: 100%;
            padding: 15px; 
            font-size: 18px; 
            background: linear-gradient(135deg, #00aaff, #0077bb); 
            border: none; 
            color: white; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 170, 255, 0.3);
        }
        #playButton:hover { 
            background: linear-gradient(135deg, #0088cc, #005599); 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 170, 255, 0.5);
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #777777;
        }
    </style>
</head>
<body>

    <div class="radio-card">
        <!-- Dein Sender-Logo (Ersetze das Bild unten durch den Link zu deinem Logo) -->
        <img src="https://via.placeholder.com/120" alt="Brian-Radio Logo" class="station-logo">
        
        <h1>Brian-Radio</h1>
        
        <!-- Album Cover -->
        <div class="cover-container">
            <img id="album-cover" src="https://via.placeholder.com/200" alt="Album Cover">
        </div>

        <!-- Song-Anzeige -->
        <div class="info-box">
            <span id="current-artist">Lade Sender...</span>
            <span id="current-title">Bitte warten</span>
        </div>

        <!-- Der unsichtbare Player -->
        <audio id="radioPlayer">
            <source src="https://stream.laut.fm/brian-radio" type="audio/mpeg">
        </audio>

        <!-- Der Play/Pause Button -->
        <button id="playButton">▶ Stream abspielen</button>

        <footer>
            &copy; 2026 Brian-Radio. Alle Rechte vorbehalten.
        </footer>
    </div>

    <script>
        const player = document.getElementById('radioPlayer');
        const button = document.getElementById('playButton');

        // Play/Pause Logik
        button.addEventListener('click', function() {
            if (player.paused) {
                player.play();
                button.textContent = '⏸ Stream pausieren';
            } else {
                player.pause();
                button.textContent = '▶ Stream abspielen';
            }
        });

        // Funktion, um die Song-Daten von laut.fm abzurufen
        function updateSongInfo() {
            fetch('https://api.laut.fm/station/brian-radio/current_song')
                .then(response => response.json())
                .then(data => {
                    const artistSpan = document.getElementById('current-artist');
                    const titleSpan = document.getElementById('current-title');
                    const coverImg = document.getElementById('album-cover');

                    if (data && data.artist && data.name) {
                        artistSpan.textContent = data.artist.name;
                        titleSpan.textContent = data.title;

                        // Cover-Logik von laut.fm
                        if (data.image && data.image !== "") {
                            coverImg.src = data.image;
                        } else if (data.album && data.album.cover && data.album.cover !== "") {
                            coverImg.src = data.album.cover;
                        } else {
                            // Standardbild, wenn kein Cover da ist
                            coverImg.src = "https://via.placeholder.com/200?text=Brian-Radio";
                        }
                    }
                })
                .catch(error => {
                    console.log('Fehler beim Laden der Song-Daten:', error);
                });
        }

        // Direkt beim Laden und alle 10 Sekunden aktualisieren
        updateSongInfo();
        setInterval(updateSongInfo, 10000);
    </script>

</body>
</html>
