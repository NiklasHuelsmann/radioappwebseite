<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brian-Radio</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1a1a1a; 
            color: #ffffff; 
            text-align: center; 
            padding: 50px; 
        }
        .container { 
            background: #2a2a2a; 
            padding: 40px; 
            border-radius: 15px; 
            max-width: 500px; 
            margin: auto; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { margin-bottom: 20px; color: #00aaff; }
        
        /* Design für den Abspielen-Knopf */
        #playButton { 
            padding: 15px 40px; 
            font-size: 20px; 
            background-color: #00aaff; 
            border: none; 
            color: white; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            transition: background 0.3s;
        }
        #playButton:hover { background-color: #0088cc; }
        
        #song-info { margin-top: 30px; color: #cccccc; font-size: 16px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Brian-Radio</h1>
        
        <!-- Der unsichtbare Player -->
        <audio id="radioPlayer">
            <source src="https://stream.laut.fm/brian-radio" type="audio/mpeg">
        </audio>

        <!-- Der schicke Button -->
        <button id="playButton">▶ Abspielen</button>

        <!-- Hier werden später die Infos geladen -->
        <div id="song-info">Warte auf Verbindung zum Stream...</div>
    </div>

    <script>
        const player = document.getElementById('radioPlayer');
        const button = document.getElementById('playButton');

        button.addEventListener('click', function() {
            if (player.paused) {
                player.play();
                button.textContent = '⏸ Pause';
            } else {
                player.pause();
                button.textContent = '▶ Abspielen';
            }
        });
    </script>

</body>
</html>
